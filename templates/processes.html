<table>
    {% if processes %}
    <tr>
        {% for keys in processes[0].keys() %}
        <th>{{ keys }}</th>
        {% endfor %}
    </tr>
    {% for process in processes %}
    <tr>
        {% for value in process.values() %}
        <td>{{ value }}</td>
        {% endfor %}
    </tr>
    {% endfor %}

    {% else %}
    <tr>
        <td colspan="100%">No processes found.</td>
    </tr>
    {% endif %}
</table>
