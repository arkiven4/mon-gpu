<h1>Processes on Server: {{ server_id }}</h1>
<table>
    <tr>
        <th>PID</th>
        <th>CUDA</th>
        <th>Command</th>
        <th>Used Memory</th>
    </tr>
    {% for process in processes %}
    <tr>
        <td>{{ process.pid }}</td>
        <td>{{ process.cuda }}</td>
        <td>{{ process.command }}</td>
        <td>{{ process.used_memory }}</td>
    </tr>
    {% endfor %}
</table>
